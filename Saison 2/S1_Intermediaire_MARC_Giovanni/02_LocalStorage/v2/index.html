<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Activité Local Storage</title>
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body id="maPage" onload="initialiser()">
    <h1>API Local Storage — Thèmes</h1>
    <button onclick="appliquerTheme('jour')">Jour</button>
    <button onclick="appliquerTheme('nuit')">Nuit</button>
    <button onclick="appliquerTheme('bleu')">Bleu</button>
    <button onclick="appliquerTheme('vert')">Vert</button>
    <button onclick="appliquerTheme('contraste')">Contraste</button>
    <p id="p1">
      Ceci est un exemple d'utilisation de l'API Local Storage de HTML5
    </p>
    <input id="txtParag" type="text" placeholder="Saisir un paragraphe..." />

    <button onclick="enregistrerParagraphe()">Enregistrer le paragraphe</button>
    <script src="js/index.js"></script>
  </body>
</html>
